  <body>
    <div id="root">
      <!-- Branded loading screen — shown while React JS bundle loads. Hidden once React renders. -->
      <style>
        #app-splash {
          position: fixed; inset: 0;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          background: #f8fafc;
          z-index: 9999;
          font-family: 'Inter', system-ui, sans-serif;
        }
        .dark #app-splash { background: #0f172a; }
        #app-splash-icon {
          width: 72px; height: 72px;
          background: #9b5208;
          border-radius: 16px;
          display: flex; align-items: center; justify-content: center;
          margin-bottom: 16px;
        }
        #app-splash-title {
          font-size: 1.5rem; font-weight: 700;
          color: #1e293b; letter-spacing: -0.02em;
        }
        .dark #app-splash-title { color: #f1f5f9; }
        #app-splash-dot {
          width: 8px; height: 8px; border-radius: 50%;
          background: #9b5208; margin-top: 24px;
          animation: splash-pulse 1s ease-in-out infinite;
        }
        @keyframes splash-pulse {
          0%, 100% { opacity: 0.3; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1); }
        }
      </style>
      <div id="app-splash">
        <div id="app-splash-icon">
          <!-- HardHat SVG icon in amber/primary color scheme -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <path d="M20 15V9a8 8 0 1 0-16 0v6h16z"/>
            <path d="M2 15h20"/>
            <path d="M12 1v4"/>
          </svg>
        </div>
        <div id="app-splash-title">Majster.AI</div>
        <div id="app-splash-dot"></div>
      </div>
    </div>
    <!-- Boot checkpoint logger + splash safety timeout (must load BEFORE main bundle) -->
