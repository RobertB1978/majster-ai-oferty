name: Supabase Preflight Audit

on:
  pull_request:
    paths:
      - '.github/workflows/supabase-preflight.yml'
      - 'scripts/supabase_preflight.sh'
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/supabase-preflight.yml'
      - 'scripts/supabase_preflight.sh'
      - 'supabase/config.toml'
      - 'supabase/migrations/**'

concurrency:
  group: supabase-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Verify Supabase access and schema endpoints (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_CLI_VERSION: 2.48.3
      REPORT_FILE: supabase-preflight-report.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets (fail fast, no values)
        shell: bash
        run: |
          set -euo pipefail
          for required in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF SUPABASE_ANON_KEY; do
            if [ -z "${!required:-}" ]; then
              echo "Missing $required"
              exit 1
            fi
          done

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Supabase CLI (pinned)
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Run Supabase preflight checks (read-only)
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/supabase_preflight.sh "$REPORT_FILE"

      - name: Upload preflight report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-preflight-report
          path: ${{ env.REPORT_FILE }}
          if-no-files-found: error
