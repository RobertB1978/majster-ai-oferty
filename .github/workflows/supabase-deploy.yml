name: Supabase Deploy (Verification Only)

on:
  pull_request:
    paths:
      - '.github/workflows/supabase-deploy.yml'
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/verify/supabase_pipeline_check.sh'
      - 'docs/DEPLOYMENT_TRUTH.md'

concurrency:
  group: supabase-deploy-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-supabase-readiness:
    name: Verify Supabase readiness (no production deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify canonical deployment workflow contract
        run: bash scripts/verify/supabase_pipeline_check.sh

      - name: Validate required secrets (names only)
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF SUPABASE_ANON_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "FAIL: Missing required secrets/vars:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "PASS: Required secrets/vars are present"

      - name: Validate Supabase project ref integrity
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "supabase/config.toml" ]; then
            echo "Missing supabase/config.toml"
            exit 1
          fi

          config_project_ref=$(awk -F '"' '/^project_id\s*=/{print $2}' supabase/config.toml)
          if [ -z "$config_project_ref" ]; then
            echo "Missing project_id in supabase/config.toml"
            exit 1
          fi

          if [[ ! "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_REF format: $SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ "$config_project_ref" != "$SUPABASE_PROJECT_REF" ]; then
            echo "Project ref mismatch: config.toml=$config_project_ref secret=$SUPABASE_PROJECT_REF"
            exit 1
          fi

          echo "PASS: Project reference validation passed for $SUPABASE_PROJECT_REF"

      - name: Validate migration ordering and naming
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "supabase/migrations" ]; then
            echo "Missing supabase/migrations"
            exit 1
          fi

          mapfile -t migration_files < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort)
          if [ "${#migration_files[@]}" -eq 0 ]; then
            echo "No migrations found in supabase/migrations"
            exit 1
          fi

          prev=""
          legacy_non_standard=0
          for file in "${migration_files[@]}"; do
            ts="${file%%_*}"
            if [[ ! "$ts" =~ ^[0-9]{8}$ && ! "$ts" =~ ^[0-9]{14}$ ]]; then
              echo "Invalid migration filename (expected YYYYMMDD or YYYYMMDDHHMMSS prefix): $file"
              exit 1
            fi

            if [[ ! "$ts" =~ ^[0-9]{14}$ ]]; then
              legacy_non_standard=$((legacy_non_standard + 1))
              echo "Warning: legacy migration naming detected (accepted for backward compatibility): $file"
            fi

            if [ -n "$prev" ] && [[ "$ts" < "$prev" ]]; then
              echo "Migrations are not sorted chronologically: $file comes after $prev"
              exit 1
            fi
            prev="$ts"
          done

          echo "PASS: Migration filename validation passed for ${#migration_files[@]} files"
          echo "Legacy non-standard migration filenames: $legacy_non_standard"

      - name: Verify workflow is non-deploying wrapper
        shell: bash
        run: |
          set -euo pipefail
          if rg -q '^\s*supabase\s+db\s+push\b|^\s*supabase\s+functions\s+deploy\b' .github/workflows/supabase-deploy.yml; then
            echo "FAIL: supabase-deploy.yml must not execute production deploy commands"
            exit 1
          fi
          echo "PASS: supabase-deploy.yml is verification-only"
