name: Supabase Deploy Autopilot

# ⚡ Uruchamianie: WYŁĄCZNIE RĘCZNIE przez GitHub Actions UI
# Cel: Deploy migracji DB + Edge Functions do Supabase (zero ręcznych kroków)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (production only for now)'
        required: false
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy-supabase:
    name: Deploy Migrations & Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      # ========================================
      # 0. FAIL FAST ON REQUIRED SECRETS
      # ========================================
      - name: 🧪 Validate required secrets
        run: |
          for required in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!required}" ]; then
              echo "❌ ERROR: Missing required GitHub secret: $required"
              exit 1
            fi
          done
          echo "✅ Required secrets are present"

      # ========================================
      # 1. CHECKOUT REPO
      # ========================================
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ========================================
      # 2. INSTALL SUPABASE CLI
      # ========================================
      - name: 🔧 Install Supabase CLI
        run: |
          # Remove old binary if exists (idempotent install) without touching repo's supabase/ folder
          sudo rm -f /usr/local/bin/supabase || true
          TMP_CLI_DIR=$(mktemp -d)
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz -C "$TMP_CLI_DIR"
          sudo mv "$TMP_CLI_DIR/supabase" /usr/local/bin/
          rm -rf "$TMP_CLI_DIR"
          supabase --version

      # ========================================
      # 3. LOGIN TO SUPABASE
      # ========================================
      - name: 🔐 Login to Supabase
        run: |
          echo "✅ SUPABASE_ACCESS_TOKEN found (${#SUPABASE_ACCESS_TOKEN} chars)"
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      # ========================================
      # 4. VALIDATE PROJECT REF MATCH
      # ========================================
      - name: 🔍 Validate project ref matches config.toml
        run: |
          # Read project_id from config.toml (source of truth)
          if [ ! -f "supabase/config.toml" ]; then
            echo "❌ ERROR: supabase/config.toml not found!"
            exit 1
          fi

          CONFIG_PROJECT_ID=$(grep 'project_id' supabase/config.toml | cut -d '"' -f 2)
          echo "📋 config.toml project_id: $CONFIG_PROJECT_ID"

          echo "🔐 GitHub Secret SUPABASE_PROJECT_REF: $SUPABASE_PROJECT_REF"

          # Validate match
          if [ "$CONFIG_PROJECT_ID" != "$SUPABASE_PROJECT_REF" ]; then
            echo ""
            echo "❌ ERROR: Project ref mismatch detected!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "config.toml:          $CONFIG_PROJECT_ID"
            echo "SUPABASE_PROJECT_REF: $SUPABASE_PROJECT_REF"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🛠️ HOW TO FIX:"
            echo "1. Check which project ref is correct (production Supabase project)"
            echo "2. Update supabase/config.toml OR GitHub Secret to match"
            echo "3. See docs/SINGLE_SOURCE_OF_TRUTH.md for details"
            echo ""
            exit 1
          fi

          echo "✅ Project ref validation passed: $CONFIG_PROJECT_ID"

      # ========================================
      # 5. LINK TO PROJECT
      # ========================================
      - name: 🔗 Link to Supabase project
        run: |
          PROJECT_REF="$SUPABASE_PROJECT_REF"
          echo "🔗 Linking to project: $PROJECT_REF"
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      # ========================================
      # 6. PUSH DATABASE MIGRATIONS
      # ========================================
      - name: 📤 Push database migrations
        run: |
          echo "📊 Checking for migrations..."
          if [ ! -d "supabase/migrations" ]; then
            echo "⚠️ No migrations folder found, skipping DB push"
            exit 0
          fi

          MIGRATION_COUNT=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "📁 Found $MIGRATION_COUNT migration file(s)"

          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "⚠️ No migration files found, skipping DB push"
            exit 0
          fi

          echo "🚀 Pushing migrations to Supabase..."
          supabase db push --password "$SUPABASE_DB_PASSWORD" --include-all --yes
          echo "✅ Database migrations applied successfully"

      # ========================================
      # 7. DEPLOY EDGE FUNCTIONS
      # ========================================
      - name: 🚀 Deploy Edge Functions
        run: |
          echo "📊 Checking for Edge Functions..."
          if [ ! -d "supabase/functions" ]; then
            echo "⚠️ No functions folder found, skipping functions deploy"
            exit 0
          fi

          FUNCTION_COUNT=$(find supabase/functions -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "📁 Found $FUNCTION_COUNT function folder(s)"

          if [ "$FUNCTION_COUNT" -eq 0 ]; then
            echo "⚠️ No function folders found, skipping functions deploy"
            exit 0
          fi

          echo "🚀 Deploying all Edge Functions..."

          # Deploy wszystkie funkcje (zachowując ustawienia verify_jwt z config.toml)
          for func_dir in supabase/functions/*/; do
            func_name=$(basename "$func_dir")

            # Pomiń folder _shared (wspólne utilities)
            if [ "$func_name" = "_shared" ]; then
              echo "⏭️ Skipping _shared folder"
              continue
            fi

            # Sprawdź czy funkcja ma plik index.ts
            if [ ! -f "$func_dir/index.ts" ]; then
              echo "⚠️ Skipping $func_name (no index.ts found)"
              continue
            fi

            echo "📦 Deploying: $func_name..."

            # Deploy funkcji (Supabase CLI automatycznie odczyta verify_jwt z config.toml)
            if supabase functions deploy "$func_name" --project-ref "$SUPABASE_PROJECT_REF" --yes; then
              echo "  ✅ $func_name deployed successfully"
            else
              echo "  ❌ $func_name deployment failed"
              exit 1
            fi
          done

          echo "✅ All Edge Functions deployed successfully"

      # ========================================
      # 8. REST CONTRACT GATE
      # Fail the workflow if required REST endpoints still return PGRST205.
      # Secrets are masked by GitHub Actions; only HTTP status codes and
      # error codes are printed — no secret values appear in logs.
      # ========================================
      - name: 🔒 REST Contract Gate (offers / user_subscriptions / offer_approvals)
        run: |
          PROJECT_REF=$(grep 'project_id' supabase/config.toml | cut -d '"' -f 2)
          REST_BASE="https://${PROJECT_REF}.supabase.co/rest/v1"

          echo "🔍 Running REST Contract Gate against: ${REST_BASE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "⚠️ WARNING: SUPABASE_ANON_KEY secret not set."
            echo "   Skipping REST Contract Gate (add secret to enable)."
            exit 0
          fi

          REQUIRED_TABLES=("offers" "user_subscriptions" "offer_approvals")
          GATE_FAILED=false

          for table in "${REQUIRED_TABLES[@]}"; do
            HTTP_STATUS=$(curl -s -o /tmp/gate_body \
              -w "%{http_code}" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${REST_BASE}/${table}?limit=0" 2>/dev/null)

            # Extract only the PostgREST error code — never print the full body
            ERROR_CODE=$(python3 -c "import json; import pathlib; p=pathlib.Path('/tmp/gate_body');d=json.loads(p.read_text()) if p.exists() else {}; print(d.get('code',''))" 2>/dev/null)

            if [ "$ERROR_CODE" = "PGRST205" ]; then
              echo "  ❌ GATE FAIL: ${table} → HTTP ${HTTP_STATUS} | code=${ERROR_CODE}"
              GATE_FAILED=true
            elif [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "206" ]; then
              echo "  ✅ OK: ${table} → HTTP ${HTTP_STATUS}"
            elif [ "$HTTP_STATUS" = "401" ] || [ "$HTTP_STATUS" = "403" ]; then
              # Table exists but RLS blocks anonymous access — that's correct and expected
              echo "  ✅ OK (RLS): ${table} → HTTP ${HTTP_STATUS}"
            else
              echo "  ❌ GATE FAIL: ${table} → HTTP ${HTTP_STATUS} | code=${ERROR_CODE:-unknown}"
              GATE_FAILED=true
            fi
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$GATE_FAILED" = "true" ]; then
            echo ""
            echo "❌ REST Contract Gate FAILED — one or more required tables are missing."
            echo "   This usually means migrations in step 6 did not apply correctly."
            echo "   Check step 6 (Push database migrations) logs for errors."
            exit 1
          fi

          echo "✅ REST Contract Gate PASSED — all required endpoints reachable."

      # ========================================
      # 9. DEPLOYMENT SUMMARY
      # ========================================
      - name: 📋 Deployment summary (step 9)
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "   SUPABASE DEPLOYMENT SUMMARY"
          echo "========================================="
          echo ""
          echo "Project: ${SUPABASE_PROJECT_REF:-[from config.toml]}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Deployed components:"
          echo "  📊 Database Migrations: ✅"
          echo "  🚀 Edge Functions: ✅"
          echo "  🔍 Verification: ✅"
          echo ""
          echo "========================================="
          echo ""
          echo "🎉 Deployment completed successfully!"
          echo ""
          echo "Next steps:"
          echo "  1. Verify in Supabase Dashboard:"
          echo "     - Table Editor: Check if tables exist"
          echo "     - Edge Functions: Check if functions deployed"
          echo "  2. Test your app (localhost or Vercel)"
          echo ""
          echo "========================================="
