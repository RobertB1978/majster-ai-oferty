name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/supabase-deploy.yml'
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

concurrency:
  group: supabase-deploy-production
  cancel-in-progress: false

jobs:
  deploy-supabase:
    name: Deploy migrations and edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets (fail fast)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          for required in SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF SUPABASE_ANON_KEY; do
            if [ -z "${!required:-}" ]; then
              echo "Missing $required"
              exit 1
            fi
          done

      - name: Validate Supabase project ref integrity
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "supabase/config.toml" ]; then
            echo "Missing supabase/config.toml"
            exit 1
          fi

          CONFIG_PROJECT_REF=$(awk -F '"' '/^project_id\s*=/{print $2}' supabase/config.toml)
          if [ -z "$CONFIG_PROJECT_REF" ]; then
            echo "Missing project_id in supabase/config.toml"
            exit 1
          fi

          if [[ ! "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]; then
            echo "Invalid SUPABASE_PROJECT_REF format: $SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ "$CONFIG_PROJECT_REF" != "$SUPABASE_PROJECT_REF" ]; then
            echo "Project ref mismatch: config.toml=$CONFIG_PROJECT_REF secret=$SUPABASE_PROJECT_REF"
            exit 1
          fi

          echo "Project reference validation passed for $SUPABASE_PROJECT_REF"

      - name: Validate migration ordering and naming
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "supabase/migrations" ]; then
            echo "Missing supabase/migrations"
            exit 1
          fi

          mapfile -t migration_files < <(find supabase/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort)
          if [ "${#migration_files[@]}" -eq 0 ]; then
            echo "No migrations found in supabase/migrations"
            exit 1
          fi

          prev=""
          legacy_non_standard=0
          for file in "${migration_files[@]}"; do
            ts="${file%%_*}"
            if [[ ! "$ts" =~ ^[0-9]{8}$ && ! "$ts" =~ ^[0-9]{14}$ ]]; then
              echo "Invalid migration filename (expected YYYYMMDD or YYYYMMDDHHMMSS prefix): $file"
              exit 1
            fi

            if [[ ! "$ts" =~ ^[0-9]{14}$ ]]; then
              legacy_non_standard=$((legacy_non_standard + 1))
              echo "Warning: legacy migration naming detected (accepted for backward compatibility): $file"
            fi

            if [ -n "$prev" ] && [[ "$ts" < "$prev" ]]; then
              echo "Migrations are not sorted chronologically: $file comes after $prev"
              exit 1
            fi
            prev="$ts"
          done

          echo "Migration filename validation passed for ${#migration_files[@]} files"
          echo "Legacy non-standard migration filenames: $legacy_non_standard"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login and link project (non-interactive)
        shell: bash
        run: |
          set -euo pipefail
          supabase --version
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations (non-interactive)
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy edge functions (non-interactive)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "supabase/functions" ]; then
            echo "No supabase/functions directory found, skipping function deployment"
            exit 0
          fi

          mapfile -t function_dirs < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          if [ "${#function_dirs[@]}" -eq 0 ]; then
            echo "No edge functions found, skipping deployment"
            exit 0
          fi

          for fn in "${function_dirs[@]}"; do
            if [ "$fn" = "_shared" ]; then
              continue
            fi
            if [ ! -f "supabase/functions/$fn/index.ts" ]; then
              echo "Skipping $fn (missing index.ts)"
              continue
            fi
            echo "Deploying function: $fn"
            supabase functions deploy "$fn"
          done

      - name: Validate deployment metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing remote migrations"
          supabase migration list
          echo "Listing remote edge functions"
          supabase functions list
          echo "Supabase deploy workflow completed successfully"
