name: Deployment Truth Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deployment-truth-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # JOB 1: Supabase — migracje + Edge Functions
  # ============================================================
  supabase-deploy:
    name: Supabase Deploy (migrations + functions)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect migration changes in this changeset
        id: detect-migrations
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          has_migrations=false

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pr_num="${{ github.event.pull_request.number }}"
            migration_files=$(gh api "repos/${{ github.repository }}/pulls/${pr_num}/files" \
              --paginate --jq '.[].filename' 2>/dev/null \
              | grep '^supabase/migrations/' || true)

          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] \
               && [ -n "${{ github.event.before }}" ]; then
            migration_files=$(gh api \
              "repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}" \
              --jq '.files[].filename' 2>/dev/null \
              | grep '^supabase/migrations/' || true)

          else
            # Initial push or force-push — conservatively treat as containing migrations
            migration_files=$(find supabase/migrations -maxdepth 1 -name '*.sql' 2>/dev/null \
              | head -5 || true)
          fi

          if [ -n "$migration_files" ]; then
            has_migrations=true
            echo "MIGRATION_GATE: Wykryto zmiany w supabase/migrations/:"
            echo "$migration_files"
          else
            echo "MIGRATION_GATE: Brak zmian w supabase/migrations/ w tym zestawie zmian."
          fi

          echo "has_migrations=${has_migrations}" >> "$GITHUB_OUTPUT"

      - name: Repo inventory
        run: bash scripts/verify/repo_inventory.sh

      - name: Verify pipeline contracts
        run: |
          bash scripts/verify/supabase_pipeline_check.sh
          bash scripts/verify/vercel_pipeline_check.sh

      - name: Validate required Supabase secrets/vars (names only)
        id: validate-secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_ANON_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          # DB auth: SUPABASE_DB_URL preferred (Session Pooler), SUPABASE_DB_PASSWORD as fallback
          if [ -z "${SUPABASE_DB_URL:-}" ] && [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            missing+=("SUPABASE_DB_URL lub SUPABASE_DB_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            if [ "${{ steps.detect-migrations.outputs.has_migrations }}" = "true" ]; then
              echo ""
              echo "╔══════════════════════════════════════════════════════════════════╗"
              echo "║  FAIL: MIGRATION-DEPENDENT PR — BRAK WYMAGANYCH SEKRETÓW        ║"
              echo "╚══════════════════════════════════════════════════════════════════╝"
              echo ""
              echo "Ten PR/push zawiera zmiany w supabase/migrations/."
              echo "Bez poniższych sekretów migracja NIE zostanie wdrożona do produkcji."
              echo "Cichy skip jest niedopuszczalny dla PR z migracjami — merge ZABLOKOWANY."
              echo ""
              echo "Brakujące sekrety GitHub (tylko nazwy — wartości nigdy nie są logowane):"
              printf '  ✗ %s\n' "${missing[@]}"
              echo ""
              echo "Jak naprawić:"
              echo "  GitHub → Settings → Secrets and variables → Actions → New repository secret"
              echo "  Wymagane sekrety: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_ANON_KEY"
              echo "                    oraz SUPABASE_DB_URL (preferowany) lub SUPABASE_DB_PASSWORD (fallback)"
              echo ""
              exit 1
            fi

            echo "WARN: Brak Supabase secrets — deploy Supabase pominięty (nie blokuje Vercel):"
            printf ' - %s\n' "${missing[@]}"
            echo "supabase_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PASS: Wszystkie wymagane secrets/vars są dostępne"
          echo "supabase_skip=false" >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        if: steps.validate-secrets.outputs.supabase_skip != 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login and link project
        if: steps.validate-secrets.outputs.supabase_skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          supabase --version
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --db-url "$SUPABASE_DB_URL"
          else
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          fi

      - name: Deploy migrations
        if: steps.validate-secrets.outputs.supabase_skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL_MODE: ON"
            supabase db push --db-url "$SUPABASE_DB_URL" --yes
          else
            echo "SUPABASE_DB_PASSWORD_MODE: ON"
            supabase db push --password "$SUPABASE_DB_PASSWORD" --yes
          fi

      - name: Deploy edge functions
        if: steps.validate-secrets.outputs.supabase_skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t function_dirs < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          for fn in "${function_dirs[@]}"; do
            if [ "$fn" = "_shared" ]; then
              continue
            fi
            if [ -f "supabase/functions/$fn/index.ts" ]; then
              echo "Deploying function: $fn"
              supabase functions deploy "$fn"
            fi
          done

      - name: Post-deploy verification (exit code truth)
        if: steps.validate-secrets.outputs.supabase_skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list
          supabase functions list
          echo "PASS: Supabase deploy commands zakończone kodem 0"

      # ── Supabase Reality Check — Phase 1 ─────────────────────────────────
      # Weryfikuje rzeczywisty stan schematu bazy po deployu.
      # Tabele + kolumny: PostgREST OpenAPI (SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY).
      # RLS: UNKNOWN w Phase 1 — patrz docs/ops/REALITY_CHECK_RUNBOOK.md.
      # Failuje workflow WYŁĄCZNIE dla P0 FAIL (brak tabeli lub kolumny).
      # Wymagane sekrety: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.

      - name: Setup Node.js (Reality Check)
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Supabase Reality Check
        id: reality-check
        if: always()
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Sprawdzamy obecność sekretów przed uruchomieniem skryptu.
          # Logujemy tylko NAZWY zmiennych, nigdy wartości.
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "REALITY_CHECK: UNKNOWN — brak wymaganych sekretów:"
            [ -z "${SUPABASE_URL:-}" ]             && echo "  - SUPABASE_URL"
            [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && echo "  - SUPABASE_SERVICE_ROLE_KEY"
            echo "Dodaj sekrety w GitHub → Settings → Secrets → Actions"
            echo "Patrz: docs/ops/REALITY_CHECK_RUNBOOK.md"
            exit 0
          fi
          node scripts/verify/supabase_reality_check.mjs

      - name: Upload Reality Check report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reality-check-report
          path: |
            scripts/verify/reality-report.json
            scripts/verify/reality-report.md
          retention-days: 90
          if-no-files-found: warn

      - name: Publish Reality Check comment in Pull Request
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'scripts/verify/reality-report.md';

            if (!fs.existsSync(reportPath)) {
              core.warning(
                'PHASE 2 PR COMMENT: Plik reality-report.md nie istnieje. ' +
                'Wymagany output Phase 1 nie został znaleziony. ' +
                'Sprawdź step "Supabase Reality Check" w tym workflow run.'
              );
              return;
            }

            const reportContent = fs.readFileSync(reportPath, 'utf8');
            const marker = '<!-- reality-check-report -->';
            const body = `## 🔍 Supabase Reality Check\n\n${marker}\n\n${reportContent}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('PHASE 2 PR COMMENT: Zaktualizowano istniejący komentarz Reality Check.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('PHASE 2 PR COMMENT: Utworzono nowy komentarz Reality Check.');
            }
      # ─────────────────────────────────────────────────────────────────────

      - name: Supabase deploy marker (PASS)
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && success() }}
        shell: bash
        run: |
          echo "SUPABASE_DEPLOY: PASS"

      - name: Supabase deploy marker (FAIL)
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && failure() }}
        shell: bash
        run: |
          echo "SUPABASE_DEPLOY: FAIL"

  # ============================================================
  # JOB 2: Vercel — deploy frontendu (tylko push do main)
  # ============================================================
  vercel-deploy:
    name: Vercel Deploy (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Uruchamia się po supabase-deploy (nawet gdy Supabase secrets są pominięte)
    needs: supabase-deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        id: vercel-check
        shell: bash
        run: |
          missing=()
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "WARN: Brak Vercel secrets — deploy pominięty:"
            printf ' - %s\n' "${missing[@]}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo ""
            echo "Jak skonfigurować:"
            echo "  1. Idź na https://vercel.com/account/tokens → utwórz token → dodaj jako VERCEL_TOKEN"
            echo "  2. W panelu Vercel projektu: Settings → General → skopiuj Project ID → dodaj jako VERCEL_PROJECT_ID"
            echo "  3. W panelu Vercel projektu: Settings → General → skopiuj Team ID → dodaj jako VERCEL_ORG_ID"
            echo "  4. Dodaj 3 secrets w: https://github.com/RobertB1978/majster-ai-oferty/settings/secrets/actions"
          else
            echo "PASS: Vercel secrets dostępne"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.vercel-check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Vercel CLI
        if: steps.vercel-check.outputs.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project config
        if: steps.vercel-check.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project for Vercel
        if: steps.vercel-check.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        if: steps.vercel-check.outputs.skip != 'true'
        id: vercel-deploy
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "VERCEL_DEPLOY: PASS — $DEPLOY_URL"

      - name: Vercel deploy marker (SKIP — brak secrets)
        if: steps.vercel-check.outputs.skip == 'true'
        shell: bash
        run: |
          echo "VERCEL_DEPLOY: SKIP — skonfiguruj VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID w GitHub Secrets"

      - name: Vercel deploy marker (FAIL)
        if: ${{ always() && steps.vercel-check.outputs.skip != 'true' && failure() }}
        shell: bash
        run: |
          echo "VERCEL_DEPLOY: FAIL"
