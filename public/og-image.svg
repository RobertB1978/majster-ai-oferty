<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Majster.AI — Profesjonalne wyceny PDF dla fachowców">
  <!-- ==========================================================================
       Majster.AI — Open Graph Social Card
       Dimensions : 1200 × 630 px  (Facebook / Twitter / LinkedIn standard)
       Format     : SVG — supported by Slack, Discord, iMessage, WhatsApp, Bing.
                    For Facebook & LinkedIn, export as PNG 1200×630 and update
                    ogImage.path in src/config/landingAssets.ts accordingly.
       Brand      : #F59E0B amber · #0A0A0A dark · #FFFFFF white
  ========================================================================== -->

  <defs>
    <!-- Amber radial glow — main, left-centre -->
    <radialGradient id="og-gl1" cx="28%" cy="58%" r="52%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber radial glow — secondary, right-top -->
    <radialGradient id="og-gl2" cx="82%" cy="22%" r="38%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle dot grid -->
    <pattern id="og-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.8" fill="rgba(255,255,255,0.045)"/>
    </pattern>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────────── -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#og-dots)"/>
  <rect width="1200" height="630" fill="url(#og-gl1)"/>
  <rect width="1200" height="630" fill="url(#og-gl2)"/>

  <!-- Left amber accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#F59E0B"/>
  <!-- Bottom fade strip -->
  <rect x="5" y="590" width="1195" height="40" fill="rgba(0,0,0,0.45)"/>

  <!-- ── LEFT COLUMN — text content ─────────────────────────────────────── -->

  <!-- Logo mark (amber square + M) -->
  <rect x="64" y="66" width="52" height="52" rx="13" fill="#F59E0B"/>
  <text x="90" y="102"
        font-family="Arial,Helvetica,sans-serif"
        font-size="28" font-weight="900" fill="#000000"
        text-anchor="middle">M</text>

  <!-- Wordmark -->
  <text x="130" y="102"
        font-family="Arial,Helvetica,sans-serif"
        font-size="30" font-weight="800" fill="#FFFFFF"
        letter-spacing="-0.4">Majster.AI</text>

  <!-- Divider -->
  <rect x="64" y="142" width="510" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Main headline — 3 lines -->
  <text x="64" y="220"
        font-family="Arial,Helvetica,sans-serif"
        font-size="56" font-weight="900" fill="#FFFFFF"
        letter-spacing="-1.8">Profesjonalne</text>
  <text x="64" y="289"
        font-family="Arial,Helvetica,sans-serif"
        font-size="56" font-weight="900" fill="#F59E0B"
        letter-spacing="-1.8">wyceny PDF</text>
  <text x="64" y="358"
        font-family="Arial,Helvetica,sans-serif"
        font-size="56" font-weight="900" fill="#FFFFFF"
        letter-spacing="-1.8">dla fachowców</text>

  <!-- Feature list -->
  <!-- Item 1 -->
  <rect x="64" y="394" width="9" height="9" rx="4.5" fill="#F59E0B"/>
  <text x="86" y="406"
        font-family="Arial,Helvetica,sans-serif"
        font-size="20" fill="#D1D5DB">Pierwsza oferta PDF w 5 minut</text>

  <!-- Item 2 -->
  <rect x="64" y="432" width="9" height="9" rx="4.5" fill="#F59E0B"/>
  <text x="86" y="444"
        font-family="Arial,Helvetica,sans-serif"
        font-size="20" fill="#D1D5DB">Asystent AI do wycen i projektów</text>

  <!-- Item 3 -->
  <rect x="64" y="470" width="9" height="9" rx="4.5" fill="#F59E0B"/>
  <text x="86" y="482"
        font-family="Arial,Helvetica,sans-serif"
        font-size="20" fill="#D1D5DB">Bezpłatnie — bez karty kredytowej</text>

  <!-- URL -->
  <text x="64" y="568"
        font-family="Arial,Helvetica,monospace,sans-serif"
        font-size="16" fill="rgba(156,163,175,0.65)"
        letter-spacing="0.6">majster.ai</text>

  <!-- ── RIGHT COLUMN — app UI mockup ───────────────────────────────────── -->

  <!-- Browser window shadow -->
  <rect x="676" y="52" width="468" height="530" rx="16"
        fill="rgba(0,0,0,0.6)" transform="translate(6,8)"/>

  <!-- Browser window frame -->
  <rect x="676" y="52" width="468" height="530" rx="16"
        fill="#111111" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bottom amber glow line -->
  <rect x="716" y="578" width="388" height="3" rx="1.5" fill="#F59E0B" opacity="0.4"/>

  <!-- Toolbar background -->
  <rect x="676" y="52" width="468" height="42" rx="16" fill="#191919"/>
  <rect x="676" y="76" width="468" height="18" fill="#191919"/>

  <!-- Traffic lights -->
  <circle cx="703" cy="73" r="5.5" fill="#FF5F57" opacity="0.9"/>
  <circle cx="724" cy="73" r="5.5" fill="#FEBC2E" opacity="0.9"/>
  <circle cx="745" cy="73" r="5.5" fill="#28C840" opacity="0.9"/>

  <!-- URL bar -->
  <rect x="766" y="62" width="272" height="22" rx="6"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="902" y="77"
        font-family="Arial,monospace,sans-serif"
        font-size="10" fill="#6B7280" text-anchor="middle">app.majster.ai/dashboard</text>

  <!-- App sidebar -->
  <rect x="676" y="94" width="68" height="488"
        fill="#0D0D0D" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Sidebar logo mark -->
  <rect x="687" y="108" width="24" height="24" rx="6" fill="#F59E0B"/>

  <!-- Active nav indicator -->
  <rect x="676" y="143" width="68" height="28" fill="rgba(245,158,11,0.07)"/>
  <rect x="676" y="143" width="3" height="28" fill="#F59E0B"/>
  <rect x="689" y="149" width="14" height="14" rx="3" fill="#F59E0B"/>

  <!-- Other nav items -->
  <rect x="689" y="186" width="14" height="14" rx="3" fill="#2D2D2D"/>
  <rect x="689" y="215" width="14" height="14" rx="3" fill="#2D2D2D"/>
  <rect x="689" y="244" width="14" height="14" rx="3" fill="#2D2D2D"/>
  <rect x="689" y="273" width="14" height="14" rx="3" fill="#2D2D2D"/>

  <!-- Content top bar -->
  <rect x="744" y="94" width="400" height="38" fill="#111111"
        stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  <rect x="756" y="107" width="110" height="12" rx="3" fill="#1E1E1E"/>

  <!-- ── Stat cards ── -->
  <!-- Card 1: amber -->
  <rect x="752" y="142" width="118" height="68" rx="8"
        fill="#161616" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="762" y="152" width="9" height="9" rx="2" fill="#F59E0B"/>
  <rect x="774" y="152" width="64" height="6" rx="2" fill="#232323"/>
  <rect x="762" y="168" width="46" height="10" rx="2" fill="#2C2C2C"/>
  <rect x="762" y="184" width="30" height="6" rx="2" fill="#1E1E1E"/>

  <!-- Card 2: blue -->
  <rect x="878" y="142" width="118" height="68" rx="8"
        fill="#161616" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="888" y="152" width="9" height="9" rx="2" fill="#3B82F6"/>
  <rect x="900" y="152" width="64" height="6" rx="2" fill="#232323"/>
  <rect x="888" y="168" width="46" height="10" rx="2" fill="#2C2C2C"/>
  <rect x="888" y="184" width="30" height="6" rx="2" fill="#1E1E1E"/>

  <!-- Card 3: green, amber border accent -->
  <rect x="1004" y="142" width="118" height="68" rx="8"
        fill="#161616" stroke="rgba(245,158,11,0.14)" stroke-width="1"/>
  <rect x="1014" y="152" width="9" height="9" rx="2" fill="#10B981"/>
  <rect x="1026" y="152" width="64" height="6" rx="2" fill="#232323"/>
  <rect x="1014" y="168" width="46" height="10" rx="2" fill="#2C2C2C"/>
  <rect x="1014" y="184" width="30" height="6" rx="2" fill="#1E1E1E"/>

  <!-- ── Table ── -->
  <!-- Header row -->
  <rect x="752" y="222" width="392" height="22" rx="4" fill="#181818"/>

  <!-- Data rows -->
  <rect x="752" y="252" width="392" height="34" fill="rgba(255,255,255,0.01)"/>
  <rect x="752" y="286" width="392" height="34" fill="rgba(255,255,255,0.02)"/>
  <rect x="752" y="320" width="392" height="34" fill="rgba(255,255,255,0.01)"/>
  <rect x="752" y="354" width="392" height="34" fill="rgba(255,255,255,0.02)"/>
  <rect x="752" y="388" width="392" height="34" fill="rgba(255,255,255,0.01)"/>

  <!-- Row dividers -->
  <rect x="752" y="251"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>
  <rect x="752" y="285"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>
  <rect x="752" y="319"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>
  <rect x="752" y="353"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>
  <rect x="752" y="387"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>
  <rect x="752" y="422"  width="392" height="0.5" fill="rgba(255,255,255,0.045)"/>

  <!-- Row content bars -->
  <rect x="760" y="263" width="114" height="7" rx="2" fill="#202020"/>
  <rect x="760" y="297" width="90"  height="7" rx="2" fill="#202020"/>
  <rect x="760" y="331" width="106" height="7" rx="2" fill="#202020"/>
  <rect x="760" y="365" width="82"  height="7" rx="2" fill="#202020"/>
  <rect x="760" y="399" width="98"  height="7" rx="2" fill="#202020"/>

  <!-- Status badges -->
  <rect x="908" y="260" width="52" height="14" rx="5"
        fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.22)" stroke-width="0.5"/>
  <rect x="908" y="294" width="46" height="14" rx="5"
        fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.22)" stroke-width="0.5"/>
  <rect x="908" y="328" width="52" height="14" rx="5"
        fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.22)" stroke-width="0.5"/>
  <rect x="908" y="362" width="52" height="14" rx="5"
        fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.22)" stroke-width="0.5"/>
  <rect x="908" y="396" width="46" height="14" rx="5"
        fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.22)" stroke-width="0.5"/>

  <!-- CTA button -->
  <rect x="752" y="434" width="184" height="38" rx="9" fill="#F59E0B"/>
  <text x="844" y="457"
        font-family="Arial,Helvetica,sans-serif"
        font-size="13" font-weight="700" fill="#000000"
        text-anchor="middle">+ Nowa wycena</text>
</svg>
